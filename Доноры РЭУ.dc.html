    <nav style="display: flex; gap: 32px; align-items: center;">
      <a href="#hero" style="text-decoration: none; color: #2B2126; font-weight: 500; font-size: 14px; transition: color 200ms;" style-hover="color: #B81D38;">Главная</a>
      <a href="#about" style="text-decoration: none; color: #2B2126; font-weight: 500; font-size: 14px; transition: color 200ms;" style-hover="color: #B81D38;">О проекте</a>

    </nav>
  </div>
</header>

<main>
  <div id="hero" data-screen-label="Главный экран">
    <x-import component-from-global-scope="DesignSystem_b9d3fc.HeroSection" hint-size="100%,600px"></x-import>
